mkdir -p .github/workflows && printf '%s\n' "name: Build Global Security SaaS
on:
  push:
    branches: [ \"main\" ]
  pull_request:
    branches: [ \"main\" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: \"3.11\"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Run project
        run: |
          echo \"Ejecutando proyecto...\"
          python main.py || echo \"No hay main.py, continúa\"
      - name: Generate build output
        run: |
          mkdir -p build
          echo \"Build completado correctamente\" > build/output.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: global-security-build
          path: build/
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: global-security-build
      - name: Verify artifact
        run: |
          echo \"Contenido del artifact:\"
          ls -R" > .github/workflows/build.yml
