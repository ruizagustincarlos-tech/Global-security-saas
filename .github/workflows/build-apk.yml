name: Build Global Security SaaS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configurar Python (ajusta versión si necesitas)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instalar dependencias (si tienes requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Ejecutar script principal (ajusta si es otro archivo)
      - name: Run project
        run: |
          echo "Ejecutando proyecto..."
          python main.py || echo "No hay main.py, continúa"

      # Crear archivo de salida (simulación de build)
      - name: Generate build output
        run: |
          mkdir -p build
          echo "Build completado correctamente" > build/output.txt

      # Subir artifact (VERSIÓN CORREGIDA)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: global-security-build
          path: build/

      # (Opcional) Descargar artifact para validar
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: global-security-build

      # Mostrar contenido descargado (debug)
      - name: Verify artifact
        run: |
          echo "Contenido del artifact:"
          ls -R